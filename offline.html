<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#0d3b66">
  <title>Offline | BioMET ’26</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="64x64" href="assets/icons/favicon-64.png">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/icons/apple-touch-icon.png">
  <style>
    :root{color-scheme:light dark}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;font-family:Inter,system-ui,-apple-system,"Segoe UI",sans-serif;color:#102a43;background:radial-gradient(900px 500px at 15% 10%,rgba(0,180,216,.18),transparent 60%),radial-gradient(800px 450px at 90% 90%,rgba(255,209,102,.18),transparent 60%),#f7f9fc}
    main{width:min(100%,520px);padding:30px;text-align:center;background:rgba(255,255,255,.94);border:1px solid rgba(13,59,102,.13);border-radius:24px;box-shadow:0 18px 50px rgba(13,59,102,.16)}
    img{width:min(100%,330px);height:auto;margin:0 auto 24px}
    h1{margin:0 0 8px;color:#0d3b66;font-size:clamp(28px,7vw,42px)}
    p{margin:0 0 20px;color:#526579;line-height:1.65}
    a,button{display:inline-flex;align-items:center;justify-content:center;min-height:46px;padding:10px 17px;border:0;border-radius:13px;color:#0d3b66;background:#ffd166;font:inherit;font-weight:800;text-decoration:none;cursor:pointer}
    .links{margin-top:13px;display:flex;flex-wrap:wrap;justify-content:center;gap:9px}.links a{min-height:40px;padding:8px 12px;color:#fff;background:#0d3b66;font-size:13px}
    @media(prefers-color-scheme:dark){body{color:#eef6ff;background:radial-gradient(900px 520px at 10% 5%,rgba(0,180,216,.18),transparent 62%),radial-gradient(760px 450px at 90% 90%,rgba(239,71,111,.12),transparent 60%),linear-gradient(145deg,#041525,#06233f 55%,#0d3b66)}main{background:rgba(8,30,52,.94);border-color:rgba(255,255,255,.13)}h1{color:#fff}p{color:#becbdd}}
  </style>
</head>
<body>
  <main>
    <img src="assets/icons/logo.png" alt="BioMET ’26">
    <h1>You are offline</h1>
    <p>The previously opened conference pages and schedule remain available. Live updates and map tiles will refresh automatically when the connection returns.</p>
    <button type="button" onclick="location.reload()">Try again</button>
    <div class="links">
      <a href="index.html">Updates</a>
      <a href="schedule.html">Schedule</a>
      <a href="venue.html">Venue</a>
      <a href="contact.html">Contact</a>
    </div>
  </main>
</body>
</html>
